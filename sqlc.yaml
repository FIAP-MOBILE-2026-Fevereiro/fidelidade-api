version: "2"
sql:
  - engine: "postgresql"
    schema:
      - "db/migrations"
    queries:
      - "db/queries"
    gen:
      go:
        package: "sqlc"
        out: "internal/store/sqlc"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_empty_slices: true
        overrides:
          - db_type: "pg_catalog.timestamptz"
            go_type: "time.Time"
