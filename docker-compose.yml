services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: fidelidade-postgres
    environment:
      POSTGRES_DB: fidelidade
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d fidelidade" ]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data

  migrate:
    image: migrate/migrate:v4.18.3
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./db/migrations:/migrations
    command:
      [
        "-path",
        "/migrations",
        "-database",
        "postgres://postgres:postgres@postgres:5432/fidelidade?sslmode=disable",
        "up",
      ]

  seed:
    image: postgres:16-alpine
    depends_on:
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./db/seeds:/seeds
    entrypoint:
      [
        "sh",
        "-c",
        "psql
          postgres://postgres:postgres@postgres:5432/fidelidade?sslmode=disable
          -f /seeds/001_demo.sql",
      ]

  api:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      seed:
        condition: service_completed_successfully
    environment:
      APP_ENV: development
      HTTP_PORT: 3000
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/fidelidade?sslmode=disable
      JWT_SECRET: change-me
      TOKEN_TTL_MINUTES: 120
      PUBLIC_BASE_URL: http://localhost:3000
      UPLOAD_DIR: storage
      MIGRATIONS_DIR: db/migrations
      AUTO_MIGRATE: "false"
      MAX_UPLOAD_SIZE_BYTES: 5242880
    ports:
      - "3000:3000"
    volumes:
      - ./storage:/app/storage

volumes:
  postgres_data:
